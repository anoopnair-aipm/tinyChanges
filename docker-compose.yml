version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tinychanges-db
    environment:
      POSTGRES_USER: tinychanges
      POSTGRES_PASSWORD: tinychanges_dev
      POSTGRES_DB: tinychanges_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinychanges"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (optional - can run separately)
  # backend:
  #   build: ./backend
  #   container_name: tinychanges-api
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     NODE_ENV: development
  #     DATABASE_URL: postgresql://tinychanges:tinychanges_dev@postgres:5432/tinychanges_dev
  #     GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  #     GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./backend:/app
  #     - /app/node_modules

volumes:
  postgres_data:

networks:
  default:
    name: tinychanges-network
